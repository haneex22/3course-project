version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: carrent
      POSTGRES_USER: carrent_user
      POSTGRES_PASSWORD: carrent_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carrent_user -d carrent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/carrent
      SPRING_DATASOURCE_USERNAME: carrent_user
      SPRING_DATASOURCE_PASSWORD: carrent_pass

volumes:
  postgres_data:
