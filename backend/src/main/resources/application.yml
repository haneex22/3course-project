spring:
  datasource:
    url: jdbc:postgresql://db:5432/carrent
    username: carrent_user
    password: carrent_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  task:
    execution:
      pool:
        core-size: 4

app:
  jwt:
    secret: carRentalSecretKey2026ForJWTGeneration
    expiration: 86400000

server:
  port: 8080
