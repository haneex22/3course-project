spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: carRentalTestSecretKey2026ForJWTGeneration
    expiration: 86400000
  scheduler:
    pending-timeout-minutes: 15
    pending-check-rate-ms: 300000
    active-check-rate-ms: 1800000

server:
  port: 0
